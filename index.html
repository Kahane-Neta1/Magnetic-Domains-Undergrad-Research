<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Domains Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar" aria-label="Presentation navigation">
      <div class="brand">MAGNETIC</div>
      <div class="nav-list" id="nav-list"></div>
    </nav>

    <main>
      <div class="slideshow" id="slideshow" aria-live="polite"></div>

      <div class="controls">
        <button class="nav-arrow prev" id="prev-button" aria-label="Previous slide">‹</button>
        <button class="nav-arrow next" id="next-button" aria-label="Next slide">›</button>
      </div>

      <div class="footer-panel">
        <div class="slide-status" id="slide-status"></div>
        <div class="progress" id="progress"></div>
      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
