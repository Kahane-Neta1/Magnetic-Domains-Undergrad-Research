<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Domains Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --surface: #111827;
      --surface-bright: #16213b;
      --text: #eef2ff;
      --muted: #a3b2d6;
      --accent: #f59e0b;
      --accent-soft: rgba(245, 158, 11, 0.14);
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
      font-family: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(245, 158, 11, 0.12), transparent 20%),
                  linear-gradient(180deg, #0b1120 0%, #060a15 100%);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      min-height: 100vh;
    }

    nav.sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: 112px;
      background: rgba(7, 12, 23, 0.96);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
      z-index: 20;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar .brand {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      letter-spacing: 0.4em;
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      padding: 0 8px;
    }

    .nav-item {
      width: 100%;
      overflow: hidden;
      border-radius: 999px;
      transition: width 0.28s ease, transform 0.28s ease, background 0.28s ease;
      background: transparent;
    }

    .nav-item:hover,
    .nav-item.active {
      width: 260px;
      background: rgba(245, 158, 11, 0.12);
      transform: translateX(4px);
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      overflow: hidden;
      white-space: nowrap;
    }

    .nav-link .icon {
      width: 36px;
      height: 36px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .nav-link .label {
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity 0.28s ease, transform 0.28s ease;
      color: var(--text);
    }

    .nav-item:hover .label,
    .nav-item.active .label {
      opacity: 1;
      transform: translateX(0);
    }

    main {
      margin-left: 112px;
      padding: 44px 48px 52px 48px;
      max-width: 1180px;
      width: calc(100% - 112px);
    }

    .page-heading {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 44px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .title {
      font-size: clamp(2.25rem, 3vw, 3.7rem);
      line-height: 1.02;
      margin: 0;
      letter-spacing: -0.04em;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      line-height: 1.9;
      font-size: 1rem;
    }

    .sections-container {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .content-section {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.97), rgba(10, 15, 28, 0.99));
      border-radius: 30px;
      padding: 42px 44px;
      min-height: 340px;
      box-shadow: var(--shadow);
      position: relative;
      scroll-margin-top: 120px;
    }

    .content-section::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 40%);
    }

    .content-section header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .content-section header h2 {
      margin: 0;
      font-size: clamp(1.55rem, 2vw, 2rem);
      letter-spacing: -0.03em;
    }

    .section-number {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.14);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 1;
    }

    .section-copy {
      margin: 0;
      line-height: 1.95;
      color: var(--muted);
      font-size: 1rem;
      z-index: 1;
      white-space: pre-line;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      nav.sidebar {
        position: sticky;
        top: 0;
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        padding: 18px 20px;
        align-items: center;
      }

      .sidebar .brand {
        display: none;
      }

      .nav-list {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 0;
      }

      .nav-item {
        width: auto;
        background: rgba(255,255,255,0.04);
        border-radius: 18px;
      }

      .nav-item:hover,
      .nav-item.active {
        width: auto;
        transform: none;
      }

      .nav-link {
        padding: 12px 14px;
      }

      .nav-link .label {
        opacity: 1;
        transform: none;
      }

      main {
        margin-left: 0;
        width: 100%;
        padding: 28px 20px 32px;
      }

      .content-section {
        padding: 30px 24px;
      }
    }

    @media (max-width: 640px) {
      body {
        background: #050813;
      }

      .content-section {
        padding: 24px 20px;
        border-radius: 24px;
      }

      .page-heading {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar" aria-label="Presentation navigation">
      <div class="brand">MAGNETIC</div>
      <div class="nav-list" id="nav-list"></div>
    </nav>

    <main>
      <div class="page-heading">
        <p class="eyebrow">Undergraduate Research Presentation</p>
        <h1 class="title">Magnetic Domains</h1>
        <p class="subtitle">A polished, section-driven view of the presentation. Each section is built from slide titles and speaker notes, with clear navigation and comfortable spacing.</p>
      </div>
      <div id="sections-container" class="sections-container"></div>
    </main>
  </div>

  <script>
    const sectionDefs = [
      { id: 'slide-1', title: 'Magnetic Relaxation Characteristics', icon: '🔄' },
      { id: 'slide-2', title: 'Magnetic Domains', icon: '🧲' },
      { id: 'slide-3', title: 'Basic Model', icon: '🧩' },
      { id: 'slide-4', title: 'Hysteresis Loop', icon: '🔁' },
      { id: 'slide-5', title: 'Disappearing', icon: '✨' },
      { id: 'slide-6', title: 'Disappearing', icon: '✨' },
      { id: 'slide-7', title: 'Motion Types', icon: '🧭' },
      { id: 'slide-8', title: 'Domain Thinning', icon: '📉' },
      { id: 'slide-9', title: 'Domain Disappearance', icon: '❌' },
      { id: 'slide-10', title: 'Domain Curvature', icon: '🌊' },
      { id: 'slide-11', title: 'Model', icon: '📐' },
      { id: 'slide-12', title: 'Domain Disappearance', icon: '🧠' },
      { id: 'slide-13', title: 'Domain Disappearance', icon: '🔎' },
      { id: 'slide-14', title: 'Summary', icon: '📚' },
      { id: 'slide-15', title: 'Math?', icon: '➗' }
    ];

    const navList = document.getElementById('nav-list');
    const contentContainer = document.getElementById('sections-container');

    sectionDefs.forEach((section) => {
      const item = document.createElement('div');
      item.className = 'nav-item';

      const link = document.createElement('a');
      link.className = 'nav-link';
      link.href = `#${section.id}`;
      link.innerHTML = `<span class="icon">${section.icon}</span><span class="label">${section.title}</span>`;

      item.appendChild(link);
      navList.appendChild(item);
    });

    Promise.all(sectionDefs.map((section) =>
      fetch(`sections/${section.id}.html`)
        .then((response) => response.ok ? response.text() : Promise.reject(response.statusText))
        .then((html) => contentContainer.insertAdjacentHTML('beforeend', html))
    )).then(() => {
      const navItems = document.querySelectorAll('.nav-item');
      const navLinks = document.querySelectorAll('.nav-link');
      const sections = document.querySelectorAll('.content-section');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          const id = entry.target.id;
          const link = document.querySelector(`.nav-link[href="#${id}"]`);
          if (entry.isIntersecting && link) {
            navItems.forEach((item) => item.classList.remove('active'));
            link.parentElement.classList.add('active');
          }
        });
      }, {
        root: null,
        rootMargin: '-30% 0px -55% 0px',
        threshold: 0.2
      });

      sections.forEach((section) => observer.observe(section));

      navLinks.forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const targetId = link.getAttribute('href');
          const target = document.querySelector(targetId);
          target?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });

      if (navItems.length) {
        navItems[0].classList.add('active');
      }
    }).catch((error) => {
      contentContainer.innerHTML = '<p style="color: var(--muted);">Unable to load presentation sections. Please view this site from a local server so section fragments can load correctly.</p>';
      console.error('Section load error:', error);
    });
  </script>
</body>
</html>
